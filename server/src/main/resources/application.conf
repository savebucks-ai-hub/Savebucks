ktor {
    deployment {
        port = 4000
        port = ${?PORT}
        host = "0.0.0.0"
    }
    application {
        modules = [ com.savebucks.ApplicationKt.module ]
    }
}

savebucks {
    supabase {
        url = ${?SUPABASE_URL}
        anonKey = ${?SUPABASE_ANON_KEY}
        serviceRoleKey = ${?SUPABASE_SERVICE_ROLE}
        jwtAudience = "authenticated"
        jwtAudience = ${?SUPABASE_JWT_AUDIENCE}
        jwtSecret = ${?SUPABASE_JWT_SECRET}
    }
    redis {
        url = ""
        url = ${?REDIS_URL}
    }
    openai {
        apiKey = ""
        apiKey = ${?OPENAI_API_KEY}
        model = "gpt-4o-mini"
        model = ${?OPENAI_MODEL}
    }
    vapid {
        publicKey = ""
        publicKey = ${?VAPID_PUBLIC_KEY}
        privateKey = ""
        privateKey = ${?VAPID_PRIVATE_KEY}
        subject = "mailto:admin@savebucks.com"
        subject = ${?VAPID_SUBJECT}
    }
    cors {
        allowedOrigins = "http://localhost:5173,http://localhost:3000"
        allowedOrigins = ${?CORS_ALLOWED_ORIGINS}
    }
    web {
        distPath = "../web/dist"
        distPath = ${?WEB_DIST_PATH}
    }
}
