services:
  # ── Background Worker ─────────────────────────────────────────────────────
  # Separate service from the API server — runs continuously, no HTTP port.
  # Render free plan supports background workers without spin-down.
  #
  # Redis is required for job queues. Recommended: Upstash Redis free tier
  #   → https://console.upstash.com  (create DB → copy "rediss://" URL)
  # Set REDIS_URL in the Render dashboard for both this service and savebucks-api.
  - type: worker
    name: savebucks-worker
    env: docker
    dockerfilePath: ./worker/Dockerfile
    plan: free
    envVars:
      # ── Required ──────────────────────────────────────────────────────────
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE
        sync: false
      # Redis — required. Use Upstash (free) or Render managed Redis ($10/mo).
      # Format: rediss://default:<password>@<host>.upstash.io:6379
      - key: REDIS_URL
        sync: false
      # ── Optional: Telegram deal ingestion bot ─────────────────────────────
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ALLOWED_CHANNELS
        sync: false
      - key: TELEGRAM_MIN_TITLE_LEN
        value: "12"

  # ── Backend: Ktor API Server ──────────────────────────────────────────────
  - type: web
    name: savebucks-api
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 10000
      # ── Required — set values in Render dashboard ─────────────────────────
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      # ── Set after frontend is deployed (use the savebucks-web URL below) ──
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      # ── Optional ──────────────────────────────────────────────────────────
      - key: REDIS_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false

  # ── Frontend: React + Vite Static Site ───────────────────────────────────
  - type: web
    name: savebucks-web
    env: static
    buildCommand: cd app/web && npm install && npm run build
    staticPublishPath: app/web/dist
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      # Vite bakes this into the bundle at build time.
      # Set it to your savebucks-api Render URL before deploying.
      - key: VITE_API_BASE
        sync: false
